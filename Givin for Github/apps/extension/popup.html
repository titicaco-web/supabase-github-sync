<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      body {
        margin: 0;
        width: 260px;
        font-family: -apple-system, system-ui, "Hanken Grotesk", sans-serif;
        background: #FBF9F6;
        color: #1C1A17;
        padding: 16px;
      }
      .logo { display: flex; align-items: center; gap: 8px; }
      .tile { position: relative; width: 24px; height: 24px; border-radius: 7px; background: #E9604C; }
      .tile i:nth-child(1) { position: absolute; left: 50%; top: 5.5px; bottom: 5.5px; width: 2.5px; margin-left: -1.25px; background: #fff; border-radius: 1px; }
      .tile i:nth-child(2) { position: absolute; top: 50%; left: 5.5px; right: 5.5px; height: 2.5px; margin-top: -1.25px; background: #fff; border-radius: 1px; }
      .word { font-weight: 800; font-size: 16px; }
      .word b { color: #E9604C; }
      p { font-size: 12.5px; color: #6B655E; line-height: 1.5; margin: 14px 0; }
      a.btn { display: block; text-align: center; background: #E9604C; color: #fff; text-decoration: none; font-weight: 700; font-size: 13px; border-radius: 10px; padding: 10px; }
      .tiny { font-size: 10.5px; color: #9A938A; margin-top: 12px; }
    </style>
  </head>
  <body>
    <div class="logo"><span class="tile"><i></i><i></i></span><span class="word">Givin<b>.</b></span></div>
    <p>Open a connection's profile and click the <strong>Send a gift</strong> button to gift them in seconds.</p>
    <a class="btn" href="https://givin.app" target="_blank">Open Givin</a>
    <p class="tiny">This launcher only reads a profile's visible name on your click. It never messages or posts for you.</p>
  </body>
</html>
