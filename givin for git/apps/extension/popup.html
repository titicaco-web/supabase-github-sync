<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      body {
        margin: 0;
        width: 260px;
        font-family: -apple-system, system-ui, "Hanken Grotesk", sans-serif;
        background: #FBF9F6;
        color: #1C1A17;
        padding: 16px;
      }
      .logo { display: flex; align-items: center; gap: 8px; }
      .word { font-weight: 800; font-size: 16px; }
      .word b { color: #E21E48; }
      p { font-size: 12.5px; color: #6B655E; line-height: 1.5; margin: 14px 0; }
      a.btn { display: block; text-align: center; background: #E21E48; color: #fff; text-decoration: none; font-weight: 700; font-size: 13px; border-radius: 10px; padding: 10px; }
      .tiny { font-size: 10.5px; color: #9A938A; margin-top: 12px; }
    </style>
  </head>
  <body>
    <div class="logo"><div style="position:relative;display:inline-block;vertical-align:middle;width:24px;height:24px;border-radius:6px;background:linear-gradient(150deg,#F43E6A,#E21E48);flex:none"><svg viewBox="0 0 100 100" width="24" height="24" style="position:absolute;inset:0"><path d="M24 47 Q50 75 76 47" fill="none" stroke="#fff" stroke-width="10" stroke-linecap="round"/></svg></div><span class="word">Givin<b>.</b></span></div>
    <p>Open a connection's profile and click the <strong>Send a gift</strong> button to gift them in seconds.</p>
    <a class="btn" href="https://givin.app" target="_blank">Open Givin</a>
    <p class="tiny">This launcher only reads a profile's visible name on your click. It never messages or posts for you.</p>
  </body>
</html>
