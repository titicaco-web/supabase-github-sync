# Supabase local config for Givin.
project_id = "givin"

[api]
enabled = true
port = 54321
schemas = ["public"]

[db]
port = 54322

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173"]

# Configure the LinkedIn (OIDC) provider in the dashboard, or here for local:
# [auth.external.linkedin_oidc]
# enabled = true
# client_id = "env(LINKEDIN_CLIENT_ID)"
# secret = "env(LINKEDIN_SECRET)"

[functions.send-gift]
verify_jwt = true

[functions.redeem]
verify_jwt = false
